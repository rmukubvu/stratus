name: Promote Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create, for example v0.1.1
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Promote current main after green CI
        uses: actions/github-script@v7
        with:
          script: |
            const version = core.getInput('version').trim();
            if (!/^v\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$/.test(version)) {
              core.setFailed(`version must look like v0.1.1, got: ${version}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const branch = await github.rest.repos.getBranch({
              owner,
              repo,
              branch: 'main',
            });
            const sha = branch.data.commit.sha;
            core.info(`main HEAD is ${sha}`);

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              branch: 'main',
              event: 'push',
              status: 'completed',
              per_page: 100,
            });

            const ciRun = runs.find((run) =>
              run.name === 'CI' &&
              run.head_sha === sha &&
              run.conclusion === 'success'
            );
            if (!ciRun) {
              core.setFailed(`no successful CI workflow run found for main HEAD ${sha}`);
              return;
            }

            core.info(`found successful CI run ${ciRun.html_url}`);

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${version}`,
              });
              core.setFailed(`tag ${version} already exists`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${version}`,
              sha,
            });

            core.notice(`created tag ${version} at ${sha}`);
